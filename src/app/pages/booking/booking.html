<section class="container">

  <h1>Book Your Tour</h1>

  <form (ngSubmit)="submit()">

    <input
      type="text"
      placeholder="Name"
      [(ngModel)]="name"
      name="name"
    >

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
      name="email"
    >

    <input
      type="date"
      [(ngModel)]="date"
      name="date"
    >

    <button type="submit">

      Confirm Booking

    </button>

  </form>

</section>
